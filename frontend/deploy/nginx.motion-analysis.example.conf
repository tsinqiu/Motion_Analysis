# Example Nginx config for Motion Analysis frontend deployment.
# Assumptions:
# - Vue build output is copied to /var/www/motion-analysis/frontend/dist
# - Node Express listens on 127.0.0.1:8080
# - Express routes keep the /api prefix, for example GET /api/activities
# - MySQL is not exposed publicly; Express connects to MySQL locally or over a private network.

server {
    listen 80;
    server_name SERVER_PUBLIC_IP;

    root /var/www/motion-analysis/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
